<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conversor de Divisas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Merriweather:wght@700&display=swap" rel="stylesheet">
    <style>
        :root{
            --bg1: #0f172a;
            --bg2: #0b486b;
            --card-bg: rgba(255,255,255,0.97);
            --accent: #0d6efd;
        }
        html,body{height:100%;}
        body {
            background: linear-gradient(135deg, var(--bg1), var(--bg2));
            font-family: 'Poppins', system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial;
            color: #0f172a;
            padding-top: 72px;
        }
        .navbar-brand{display:flex;align-items:center;gap:10px;font-weight:600}
        .brand-logo{width:40px;height:40px}
        .converter-card {
            border-radius: 14px;
            backdrop-filter: blur(6px);
            background: var(--card-bg);
            box-shadow: 0 10px 30px rgba(2,6,23,0.45);
        }
        .result-box {
            font-size: 1.25rem;
            font-weight: 700;
            color: #198754;
        }
    </style>
</head>

<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-transparent fixed-top">
        <div class="container">
            <a class="navbar-brand" href="#">
                <img src="/static/logo.svg" alt="Logo" class="brand-logo">
                Conversor
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMain" aria-controls="navMain" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navMain">
                <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
                    <li class="nav-item"><a class="nav-link active" href="#">Inicio</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="d-flex justify-content-center align-items-start vh-100">
        <div class="card shadow-lg p-4 converter-card converter-wrap mt-4">
            <div class="text-center mb-3">
                <h2>💱 Conversor de Divisas</h2>
                <p class="text-muted small">Un diseño moderno</p>
            </div>

            <form method="post">
                <div class="mb-3">
                    <label class="form-label">Cantidad</label>
                    <input type="number" step="0.01" name="amount" 
                           class="form-control form-control-lg" 
                           placeholder="Introduce cantidad" required>
                </div>

                <div class="row g-2 mb-3 align-items-center">
                    <div class="col-5 col-md-5">
                        <select name="from_currency" class="form-select">
                            <option value="EUR">EUR €</option>
                            <option value="USD">USD $</option>
                            <option value="GBP">GBP £</option>
                        </select>
                    </div>
                    <div class="col-2 text-center text-muted">→</div>
                    <div class="col-5 col-md-5">
                        <select name="to_currency" class="form-select">
                            <option value="USD">USD $</option>
                            <option value="EUR">EUR €</option>
                            <option value="GBP">GBP £</option>
                        </select>
                    </div>
                </div>

                <div class="d-grid mb-2">
                    <button type="submit" class="btn btn-primary btn-lg">
                        Convertir
                    </button>
                </div>
            </form>

            {% if result is not none %}
                <div class="mt-3 text-center result-box">
                    {{ result }}
                </div>
            {% endif %}
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
